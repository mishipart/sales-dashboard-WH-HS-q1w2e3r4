<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>방송 매출 대시보드</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root{
      --bg:#f5f7fb; --card:#fff; --line:#e6ebf4; --text:#111827; --muted:#6b7280;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1280px;margin:18px auto;padding:0 14px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
    .title{display:flex;gap:10px;align-items:center}
    .title h1{font-size:28px;margin:0}
    .title p{margin:6px 0 0;color:var(--muted);font-size:13px}

    .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;cursor:pointer}
    .btn.primary{border-color:#b8ccff;background:#eaf1ff}
    .pill{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;color:var(--muted);font-size:13px}

    .grid{display:grid;grid-template-columns:320px 1fr;gap:14px}
    .grid.filters-collapsed{grid-template-columns:1fr;}

    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 8px 24px rgba(17,24,39,.04)}
    .card .hd{padding:14px 14px 0}
    .card .bd{padding:14px}

    .filters .sec{margin-bottom:16px}
    .filters .sec h3{margin:0 0 8px;font-size:14px}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{
      border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 11px;min-width:46px;
      text-align:center;font-size:12px;cursor:pointer;user-select:none;transition:.12s ease;
    }
    .chip:hover{border-color:#9bb8ff;background:#f7faff}
    .chip.on{border-color:#7aa3ff;background:#eaf1ff;color:#1746a2;font-weight:700}
    .chip.disabled{opacity:.32;background:#f3f4f6;color:#9ca3af;cursor:not-allowed;text-decoration:line-through}
    .chip.disabled:hover{border-color:var(--line);background:#f3f4f6}

    .filters .sec .tools{display:flex;gap:6px;margin-left:auto}
    .filters .sec .tools .btn{
      padding:6px 9px;
      font-size:12px;
      line-height:1.2;
      border-radius:10px;
      min-width:42px;
    }
    .filters .sec .row{display:flex;align-items:center;justify-content:space-between;gap:10px}

    .kpis{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
    .kpi{background:#eaf1ff;border-radius:14px;padding:12px 10px;min-height:118px;display:flex;flex-direction:column;justify-content:flex-start}
    .kpi .k{font-size:11px;color:#475569;line-height:1.35;word-break:keep-all}
    .kpi .v{font-size:16px;font-weight:800;margin-top:8px;line-height:1.35;word-break:keep-all}

    .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}
    .charts .span2{grid-column:1 / -1}
    .chartBox{position:relative;height:320px;min-height:320px;overflow:hidden}
    .chartBox.tall{height:360px;min-height:360px}
    .chartBox.short{height:280px;min-height:280px}
    .chartBox canvas{position:absolute;inset:0;display:block}

    .status{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .status .left{display:flex;gap:10px;align-items:center}
    .grid.filters-collapsed .filtersWrap{display:none}
    .btn.toggle{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:9px 14px}
    .btn.toggle .arrow{display:inline-block;width:18px;text-align:center;font-weight:700;color:#64748b}

    @media (max-width: 1100px){
      .grid{grid-template-columns:1fr}
      .grid.filters-collapsed{grid-template-columns:1fr}
      .kpis{grid-template-columns:repeat(2,1fr)}
      .charts{grid-template-columns:1fr}
      .charts .span2{grid-column:auto}
      .chartBox,.chartBox.tall,.chartBox.short{height:320px;min-height:320px}
      .kpi{min-height:100px}
      .kpi .v{font-size:17px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <div style="font-size:28px">📊</div>
        <div>
          <h1>방송 매출 대시보드</h1>
          <p>엑셀 슬라이서처럼 선택하면 KPI/차트가 즉시 변경됩니다.</p>
        </div>
      </div>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        <span class="pill" id="statusPill">상태: -</span>
        <button class="btn toggle" id="btnToggleFilters" title="필터를 접거나 펼칩니다">
          <span class="arrow" id="toggleArrow">▾</span>
          <span id="toggleLabel">필터 접기</span>
        </button>
        <button class="btn" id="btnReset">전체 해제</button>
        <button class="btn primary" id="btnRefresh">새로고침</button>
        <button class="btn" id="btnKey">키 변경</button>
      </div>
    </div>

    <div class="grid" id="gridRoot">
      <div class="card filters filtersWrap" id="filtersCard">
        <div class="hd"><h3 style="margin:0;font-size:16px">필터(슬라이서)</h3></div>
        <div class="bd" id="filters"></div>
        <div class="bd" style="padding-top:0;color:var(--muted);font-size:12px">
          ※ 선택 조건에 데이터가 없는 값은 자동으로 비활성화됩니다.
        </div>
      </div>

      <div>
        <div class="card" style="margin-bottom:14px">
          <div class="bd">
            <div class="status">
              <div class="left"><span class="pill" id="statusText">상태: -</span></div>
              <div style="color:var(--muted);font-size:13px" id="updatedText">업데이트: -</div>
            </div>
            <div class="kpis" id="kpis"></div>
          </div>
        </div>

        <div class="charts">
          <div class="card">
            <div class="hd"><h3 style="margin:0">방송채널별 (목표/실적/달성율)</h3></div>
            <div class="bd"><div class="chartBox"><canvas id="chChannel"></canvas></div></div>
          </div>
          <div class="card">
            <div class="hd"><h3 style="margin:0">월별 (목표/실적/달성율)</h3></div>
            <div class="bd"><div class="chartBox"><canvas id="chMonth"></canvas></div></div>
          </div>
          <div class="card">
            <div class="hd"><h3 style="margin:0">요일별 (목표/실적/달성율)</h3></div>
            <div class="bd"><div class="chartBox short"><canvas id="chDow"></canvas></div></div>
          </div>
          <div class="card">
            <div class="hd"><h3 style="margin:0">일자별 (목표/실적/달성율) - TOP 30</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chDay"></canvas></div></div>
          </div>
          <div class="card span2">
            <div class="hd"><h3 style="margin:0">아이템별 (목표/실적/달성율)</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chItem"></canvas></div></div>
          </div>

          <div class="card span2">
            <div class="hd"><h3 style="margin:0">게스트별 (목표/실적/달성율)</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chGuest"></canvas></div></div>
          </div>

          <div class="card">
            <div class="hd"><h3 style="margin:0">방송채널별 이익</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chProfitChannel"></canvas></div></div>
          </div>
          <div class="card">
            <div class="hd"><h3 style="margin:0">아이템별 이익</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chProfitItem"></canvas></div></div>
          </div>
          <div class="card span2">
            <div class="hd"><h3 style="margin:0">게스트별 이익</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chProfitGuest"></canvas></div></div>
          </div>
          <div class="card">
            <div class="hd"><h3 style="margin:0">방송채널별 수수료율</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chFeeChannel"></canvas></div></div>
          </div>
          <div class="card">
            <div class="hd"><h3 style="margin:0">아이템별 수수료율</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chFeeItem"></canvas></div></div>
          </div>
          <div class="card span2">
            <div class="hd"><h3 style="margin:0">게스트별 수수료율</h3></div>
            <div class="bd"><div class="chartBox tall"><canvas id="chFeeGuest"></canvas></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyHS97velyCu_XVWvDhOgsJ0Tl5bdkflIK9eapmi4vxxm0DIRThVP0A_acVmYAuCSPWJw/exec";
const DEFAULT_KEY = "WHHS-PSM-221035";
const FILTER_UI_KEY = "dash_filters_collapsed";
const DOW_ORDER = ['일','월','화','수','목','금','토'];

const store = {
  key: localStorage.getItem('dash_key') || DEFAULT_KEY,
  filters: { years:[], months:[], days:[], dows:[], items:[], channels:[], guests:[] },
  options: null,
  availableOptions: null,
  charts: {
    channel:null, month:null, dow:null, day:null, item:null, guest:null,
    profitChannel:null, profitItem:null, profitGuest:null,
    feeChannel:null, feeItem:null, feeGuest:null
  },
  renderQueued: false,
  lastData: null,
};

const elStatusPill = document.getElementById('statusPill');
const elStatusText = document.getElementById('statusText');
const elUpdated = document.getElementById('updatedText');
const elFilters = document.getElementById('filters');
const elKpis = document.getElementById('kpis');

const gridRoot = document.getElementById("gridRoot");
const btnToggleFilters = document.getElementById("btnToggleFilters");
const toggleLabel = document.getElementById("toggleLabel");
const toggleArrow = document.getElementById("toggleArrow");

function setFiltersCollapsed(collapsed){
  if (collapsed) gridRoot.classList.add("filters-collapsed");
  else gridRoot.classList.remove("filters-collapsed");

  toggleLabel.textContent = collapsed ? "필터 펼치기" : "필터 접기";
  toggleArrow.textContent = collapsed ? "▸" : "▾";
  localStorage.setItem(FILTER_UI_KEY, collapsed ? "1" : "0");

  requestAnimationFrame(()=>requestAnimationFrame(()=>{ if (store.lastData) renderFromData(store.lastData); }));
}
btnToggleFilters.addEventListener("click", ()=>setFiltersCollapsed(!gridRoot.classList.contains("filters-collapsed")));
(function initFiltersCollapsed(){ setFiltersCollapsed(localStorage.getItem(FILTER_UI_KEY) === "1"); })();

document.getElementById('btnKey').addEventListener('click', () => {
  const k = prompt("접속 키를 입력하세요", store.key || "");
  if (k == null) return;
  store.key = (k || "").trim();
  localStorage.setItem('dash_key', store.key);
  loadAll(true);
});
document.getElementById('btnRefresh').addEventListener('click', ()=> loadAll(true));
document.getElementById('btnReset').addEventListener('click', ()=>{
  store.filters = { years:[], months:[], days:[], dows:[], items:[], channels:[], guests:[] };
  renderFilters();
  loadAll(true);
});

function setStatus(ok, msg){
  const t = ok ? `상태: 정상 · ${msg}` : `상태: 오류 · ${msg}`;
  elStatusPill.textContent = t;
  elStatusText.textContent = t;
  elStatusPill.style.color = ok ? '#166534' : '#b91c1c';
  elStatusText.style.color = ok ? '#166534' : '#b91c1c';
}
function toNumberSafe(v){
  if (v === null || v === undefined) return 0;
  if (typeof v === 'number') return Number.isFinite(v) ? v : 0;
  let s = String(v).trim();
  if (!s || s === '-') return 0;
  s = s.replace(/\s/g,'').replace(/,/g,'').replace(/[^0-9.\-]/g,'');
  const m = s.match(/^(-?\d+)\.(\d{3})$/);
  if (m) s = m[1] + m[2];
  const n = Number(s);
  return Number.isFinite(n) ? n : 0;
}
function fmt(n, d=0){ return toNumberSafe(n).toLocaleString(undefined,{maximumFractionDigits:d}); }
function fmtPct(p, d=1){
  let v = toNumberSafe(p);
  if (v <= 1.5) v = v * 100;
  return `${v.toFixed(d)}%`;
}
function qs(obj){
  const u = new URLSearchParams();
  Object.entries(obj).forEach(([k,v])=>{
    if (Array.isArray(v) && v.length) u.set(k, v.join(','));
    else if (v !== undefined && v !== null && v !== '' && !(Array.isArray(v) && !v.length)) u.set(k, v);
  });
  return u.toString();
}
function debounceRender(fn){
  if (store.renderQueued) return;
  store.renderQueued = true;
  requestAnimationFrame(()=>{ store.renderQueued = false; fn(); });
}
function safeArr(a){ return Array.isArray(a) ? a : []; }
function normalizeRateArray(arr){
  return safeArr(arr).map(v=>{
    const n = toNumberSafe(v);
    return n <= 1.5 ? n * 100 : n;
  });
}
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb = "CB_" + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    let done = false;
    const cleanup = () => {
      if (done) return;
      done = true;
      try { delete window[cb]; } catch(e){}
      s.remove();
    };
    window[cb] = (data) => { cleanup(); resolve(data); };
    s.onerror = () => { cleanup(); reject(new Error("JSONP load failed")); };
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.body.appendChild(s);
    setTimeout(()=>{ cleanup(); reject(new Error("JSONP timeout")); }, 20000);
  });
}
async function apiFetch(action){
  if (!API_URL) throw new Error("API_URL을 설정해야 합니다.");
  if (!store.key) throw new Error("키가 없습니다. 우측 상단 '키 변경'에서 입력하세요.");

  const payload = {
    action,
    key: store.key,
    years: store.filters.years,
    months: store.filters.months,
    days: store.filters.days,
    dows: store.filters.dows,
    items: store.filters.items,
    channels: store.filters.channels,
    guests: store.filters.guests,
  };
  const res = await jsonp(`${API_URL}?${qs(payload)}`);
  if (!res || res.ok === false) throw new Error(res?.message || "API error");
  return res;
}

function toggleInList(list, v){
  const i = list.indexOf(v);
  if (i>=0) list.splice(i,1);
  else list.push(v);
}
function sortMonth(arr){ return [...arr].map(Number).sort((a,b)=>a-b).map(String); }
function sortDay(arr){ return [...arr].map(Number).sort((a,b)=>a-b).map(String); }
function sortDow(arr){
  const set = new Set(arr);
  return DOW_ORDER.filter(x=>set.has(x));
}
function sortedValues(key, values){
  if (key === 'months') return sortMonth(values||[]);
  if (key === 'days') return sortDay(values||[]);
  if (key === 'dows') return sortDow(values||[]);
  return (values||[]).filter(v=>v && v!=='(비어있음)').sort((a,b)=>String(a).localeCompare(String(b),'ko'));
}

function renderFilters(){
  if (!store.options){
    elFilters.innerHTML = `<div style="color:var(--muted);font-size:13px">옵션 로딩 중...</div>`;
    return;
  }

  const opts = store.options;
  const available = store.availableOptions || opts;

  const sections = [
    { key:'years', label:'연도', values: sortedValues('years', opts.years) },
    { key:'months', label:'월', values: sortedValues('months', opts.months) },
    { key:'days', label:'일', values: sortedValues('days', opts.days) },
    { key:'dows', label:'요일', values: sortedValues('dows', opts.dows) },
    { key:'items', label:'아이템', values: sortedValues('items', opts.items) },
    { key:'channels', label:'방송채널', values: sortedValues('channels', opts.channels) },
    { key:'guests', label:'게스트', values: sortedValues('guests', opts.guests) },
  ];

  elFilters.innerHTML = sections.map(sec=>{
    const sel = store.filters[sec.key] || [];
    const availSet = new Set((available[sec.key] || []).map(String));

    return `
      <div class="sec">
        <div class="row">
          <h3>${sec.label}</h3>
          <div class="tools">
            <button class="btn" data-act="all" data-key="${sec.key}">전체</button>
            <button class="btn" data-act="clear" data-key="${sec.key}">해제</button>
          </div>
        </div>
        <div class="chips">
          ${sec.values.map(v=>{
            const sv = String(v);
            const on = sel.includes(sv);
            const disabled = !on && !availSet.has(sv);
            return `<div class="chip ${on?'on':''} ${disabled?'disabled':''}" data-key="${sec.key}" data-val="${sv}" data-disabled="${disabled ? '1':'0'}">${sv}</div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  elFilters.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click', ()=>{
      if (ch.dataset.disabled === '1') return;
      const k = ch.dataset.key;
      const v = ch.dataset.val;
      toggleInList(store.filters[k], v);
      renderFilters();
      loadAll(false);
    });
  });

  elFilters.querySelectorAll('button[data-act]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const k = btn.dataset.key;
      const act = btn.dataset.act;
      const sec = sections.find(s=>s.key===k);
      if (!sec) return;

      if (act==='all') {
        const availSet = new Set((available[k] || []).map(String));
        store.filters[k] = sec.values.map(String).filter(v=>availSet.has(v));
      } else {
        store.filters[k] = [];
      }

      renderFilters();
      loadAll(false);
    });
  });
}

function destroyChart(ch){ if (ch && typeof ch.destroy === 'function') ch.destroy(); }
function canvasIdMap(id){
  return {
    chChannel:'channel',
    chMonth:'month',
    chDow:'dow',
    chDay:'day',
    chItem:'item',
    chGuest:'guest',
    chProfitChannel:'profitChannel',
    chProfitItem:'profitItem',
    chProfitGuest:'profitGuest',
    chFeeChannel:'feeChannel',
    chFeeItem:'feeItem',
    chFeeGuest:'feeGuest'
  }[id];
}
function prepareCanvas(canvasId){
  const canvas = document.getElementById(canvasId);
  const box = canvas.parentElement;
  const rect = box.getBoundingClientRect();
  const w = Math.max(10, Math.floor(rect.width));
  const h = Math.max(10, Math.floor(rect.height));
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  canvas.width = w;
  canvas.height = h;
  return canvas;
}

function makeComboChart(canvasId, labels, goal, actual, ratePct, count){
  const key = canvasIdMap(canvasId);
  destroyChart(store.charts[key]);
  const canvas = prepareCanvas(canvasId);
  const rate100 = normalizeRateArray(ratePct);

  store.charts[key] = new Chart(canvas, {
    data: {
      labels: safeArr(labels),
      datasets: [
        { type:'bar', label:'목표(합계)', data: safeArr(goal), yAxisID:'y', borderWidth:0, barPercentage:.8, categoryPercentage:.7 },
        { type:'bar', label:'실적(합계)', data: safeArr(actual), yAxisID:'y', borderWidth:0, barPercentage:.8, categoryPercentage:.7 },
        { type:'line', label:'달성율(%)', data: rate100, yAxisID:'y1', tension:0.25, pointRadius:3, pointHoverRadius:6 }
      ]
    },
    options: {
      responsive:false, maintainAspectRatio:false, animation:false,
      plugins:{
        legend:{ position:'top' },
        tooltip:{
          intersect:false, mode:'index',
          callbacks:{ afterBody:(items)=>{
            const i = items?.[0]?.dataIndex ?? -1;
            if (i<0) return '';
            return [`방송횟수: ${fmt(count?.[i] ?? 0)}`, `달성율: ${fmtPct(rate100?.[i] ?? 0, 1)}`];
          }}
        }
      },
      scales:{
        y:{ beginAtZero:true, ticks:{ callback:(v)=> fmt(v) } },
        y1:{ beginAtZero:true, position:'right', grid:{ drawOnChartArea:false }, ticks:{ callback:(v)=> v + '%' } }
      }
    }
  });
}

function makeProfitChart(canvasId, labels, profitSum, count){
  const key = canvasIdMap(canvasId);
  destroyChart(store.charts[key]);
  const canvas = prepareCanvas(canvasId);
  const profitArr = safeArr(profitSum).map(toNumberSafe);

  store.charts[key] = new Chart(canvas, {
    data: {
      labels: safeArr(labels),
      datasets: [
        { type:'bar', label:'이익합계', data: profitArr, yAxisID:'y', borderWidth:0, barPercentage:.75, categoryPercentage:.7 }
      ]
    },
    options: {
      responsive:false, maintainAspectRatio:false, animation:false,
      plugins:{
        legend:{ position:'top' },
        tooltip:{
          intersect:false,
          mode:'index',
          callbacks:{ afterBody:(items)=>{
            const i = items?.[0]?.dataIndex ?? -1;
            if (i<0) return '';
            return [`방송횟수: ${fmt(count?.[i] ?? 0)}`, `이익합계: ${fmt(profitArr?.[i] ?? 0, 0)}`];
          }}
        }
      },
      scales:{ y:{ beginAtZero:false, ticks:{ callback:(v)=> fmt(v) } } }
    }
  });
}

function makeFeeStatsChart(canvasId, labels, avgFeeRate, minFeeRate, maxFeeRate, count){
  const key = canvasIdMap(canvasId);
  destroyChart(store.charts[key]);
  const canvas = prepareCanvas(canvasId);

  const avg100 = normalizeRateArray(avgFeeRate);
  const min100 = normalizeRateArray(minFeeRate);
  const max100 = normalizeRateArray(maxFeeRate);

  store.charts[key] = new Chart(canvas, {
    data: {
      labels: safeArr(labels),
      datasets: [
        { type:'line', label:'최고 수수료율(%)', data:max100, yAxisID:'y', tension:.25, pointRadius:3, pointHoverRadius:6 },
        { type:'line', label:'평균 수수료율(%)', data:avg100, yAxisID:'y', tension:.25, pointRadius:3, pointHoverRadius:6 },
        { type:'line', label:'최저 수수료율(%)', data:min100, yAxisID:'y', tension:.25, pointRadius:3, pointHoverRadius:6 }
      ]
    },
    options: {
      responsive:false, maintainAspectRatio:false, animation:false,
      plugins:{
        legend:{ position:'top' },
        tooltip:{
          intersect:false,
          mode:'index',
          callbacks:{ afterBody:(items)=>{
            const i = items?.[0]?.dataIndex ?? -1;
            if (i<0) return '';
            return [
              `방송횟수: ${fmt(count?.[i] ?? 0)}`,
              `최고: ${fmtPct(max100?.[i] ?? 0, 1)}`,
              `평균: ${fmtPct(avg100?.[i] ?? 0, 1)}`,
              `최저: ${fmtPct(min100?.[i] ?? 0, 1)}`
            ];
          }}
        }
      },
      scales:{ y:{ beginAtZero:true, ticks:{ callback:(v)=> v + '%' } } }
    }
  });
}

function renderKpis(k){
  const items = [
    ['방송횟수', fmt(k?.broadcastCount)],
    ['특약횟수', fmt(k?.specialCount)],
    ['특약비용', fmt(k?.specialCost, 0)],
    ['평균달성율', fmtPct(k?.achievementRate, 1)],
    ['방송시간(분)', fmt(k?.totalMinutes)],
    ['시간당매출', fmt(k?.salesPerHour, 2)],
    ['평균 수수료율', fmtPct(k?.avgFeeRate, 1)],
    ['이익합계(평균)', `${fmt(k?.profitSum, 0)} (${fmt(k?.profitAvg, 0)})`],
  ];
  elKpis.innerHTML = items.map(([kk,v])=>`<div class="kpi"><div class="k">${kk}</div><div class="v">${v}</div></div>`).join('');
}

function renderFromData(data){
  renderKpis(data.kpis || {});

  debounceRender(()=>{
    const charts = data.charts || {};

    const ch = charts.channel || {};
    const idx = safeArr(ch.labels).map((v,i)=>[String(v), i])
      .filter(([v])=>v && v!=='(비어있음)')
      .sort((a,b)=>a[0].localeCompare(b[0], 'en'));
    const pick = (arr)=> idx.map(([_,i])=> arr?.[i] ?? 0);

    makeComboChart('chChannel', idx.map(x=>x[0]), pick(ch.goal), pick(ch.actual), pick(ch.ratePct), pick(ch.count));

    const month = charts.month || {};
    makeComboChart('chMonth', month.labels, month.goal, month.actual, month.ratePct, month.count);

    const dow = charts.dow || {};
    makeComboChart('chDow', dow.labels, dow.goal, dow.actual, dow.ratePct, dow.count);

    const day = charts.day || {};
    makeComboChart('chDay', day.labels, day.goal, day.actual, day.ratePct, day.count);

    const item = charts.item || {};
    makeComboChart('chItem', item.labels, item.goal, item.actual, item.ratePct, item.count);

    const guest = charts.guest || {};
    makeComboChart('chGuest', guest.labels, guest.goal, guest.actual, guest.ratePct, guest.count);

    const profitCh = charts.profitChannel || charts.channel || {};
    const profitChIdx = safeArr(profitCh.labels).map((v,i)=>[String(v), i])
      .filter(([v])=>v && v!=='(비어있음)')
      .sort((a,b)=>a[0].localeCompare(b[0], 'en'));
    const profitChPick = (arr)=> profitChIdx.map(([_,i])=> arr?.[i] ?? 0);

    makeProfitChart('chProfitChannel',
      profitChIdx.map(x=>x[0]),
      profitChPick(profitCh.profitSum),
      profitChPick(profitCh.count)
    );

    const profitItem = charts.profitItem || charts.item || {};
    makeProfitChart('chProfitItem', profitItem.labels, profitItem.profitSum, profitItem.count);

    const profitGuest = charts.profitGuest || charts.guest || {};
    makeProfitChart('chProfitGuest', profitGuest.labels, profitGuest.profitSum, profitGuest.count);

    const feeCh = charts.feeChannel || charts.channel || {};
    const feeChIdx = safeArr(feeCh.labels).map((v,i)=>[String(v), i])
      .filter(([v])=>v && v!=='(비어있음)')
      .sort((a,b)=>a[0].localeCompare(b[0], 'en'));
    const feeChPick = (arr)=> feeChIdx.map(([_,i])=> arr?.[i] ?? 0);

    makeFeeStatsChart('chFeeChannel',
      feeChIdx.map(x=>x[0]),
      feeChPick(feeCh.avgFeeRate),
      feeChPick(feeCh.minFeeRate),
      feeChPick(feeCh.maxFeeRate),
      feeChPick(feeCh.count)
    );

    const feeItem = charts.feeItem || charts.item || {};
    makeFeeStatsChart('chFeeItem', feeItem.labels, feeItem.avgFeeRate, feeItem.minFeeRate, feeItem.maxFeeRate, feeItem.count);

    const feeGuest = charts.feeGuest || charts.guest || {};
    makeFeeStatsChart('chFeeGuest', feeGuest.labels, feeGuest.avgFeeRate, feeGuest.minFeeRate, feeGuest.maxFeeRate, feeGuest.count);
  });
}

async function loadAll(force){
  try{
    setStatus(true, '로딩 중...');

    if (!store.options || force){
      const o = await apiFetch('options');
      store.options = o.options || o;
      renderFilters();
    }

    const data = await apiFetch('dashboard');
    store.lastData = data;
    store.availableOptions = data.availableOptions || store.options;

    elUpdated.textContent = `업데이트: ${data.updated || '-'}`;
    setStatus(true, '필터 적용 완료');

    renderFilters();
    renderFromData(data);
  } catch(err){
    console.error(err);
    setStatus(false, err.message || String(err));
  }
}

(async function init(){
  if (!store.key){
    const k = prompt("접속 키를 입력하세요");
    store.key = (k || "").trim();
    localStorage.setItem('dash_key', store.key);
  }
  await loadAll(true);
})();
</script>
